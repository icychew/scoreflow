name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push backend/ to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          username = os.environ["HF_USERNAME"]
          repo_id = f"{username}/scoreflow-api"

          api = HfApi(token=token)

          # Create space if it doesn't exist yet
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  exist_ok=True,
                  private=False,
              )
              print(f"Space {repo_id} ready")
          except Exception as e:
              print(f"Note: {e}")

          # Upload the backend/ folder contents as the Space root
          api.upload_folder(
              folder_path="backend",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"Deploy from GitHub Actions",
          )
          print(f"Deployed to https://huggingface.co/spaces/{repo_id}")
          print(f"API URL: https://{username}-scoreflow-api.hf.space")
          EOF
